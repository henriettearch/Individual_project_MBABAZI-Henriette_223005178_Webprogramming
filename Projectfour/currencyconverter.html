<!DOCTYPE html>
<html>
<head>
    <title>Currency Converter</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #000; /* black sides like your image */
        }

        .wrapper {
            width: 420px;
            margin: 30px auto;
            background: #e0e0e0;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.5);
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: inline-block;
            width: 150px;
            font-size: 14px;
        }

        input, select {
            width: 220px;
            padding: 10px;
            border: none;
            background: #f5f5f5;
        }

        select {
            appearance: none;
        }

        .row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #2980b9;
        }

        .result-title {
            margin-top: 20px;
            font-size: 14px;
        }

        .result-box {
            background: black;
            color: white;
            padding: 20px;
            margin-top: 10px;
            height: 80px;
        }
    </style>
</head>

<body>

<div class="wrapper">
    <h2>Currency Converter APP</h2>

    <div class="form-group row">
        <label>Enter Amount IN FRW</label>
        <input type="number" id="amount">
    </div>

    <div class="form-group row">
        <label>Select Currency</label>
        <select id="currency">
            <option value="USD">USD</option>
            <option value="EURO">EURO</option>
        </select>
    </div>

    <div class="form-group row">
        <label>Rate</label>
        <input type="number" id="rate">
    </div>

    <button onclick="convert()">CONVERT</button>

    <div class="result-title">Result</div>
    <div class="result-box" id="result">Result Here ....</div>
</div>

<script>
function convert() {
    let amount = document.getElementById("amount").value;
    let rate = document.getElementById("rate").value;
    let currency = document.getElementById("currency").value;

    if (amount === "" || rate === "") {
        alert("Please fill all fields");
        return;
    }

    let result = amount * rate;

    document.getElementById("result").innerHTML =
        amount + " FRW = " + result + " " + currency;
}
</script>

</body>
</html>
